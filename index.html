<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Sweet Home - Bill Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --primary-green: #16a34a;
            --dark-text: #1f2937;
            --light-gray: #f3f4f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            padding: 20px;
        }

        .invoice-container {
            background-color: white;
            width: 210mm; 
            min-height: 297mm;
            margin: 0 auto;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
            direction: ltr;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary-blue);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-section {
            width: 200px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .logo-section img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .company-details {
            text-align: right;
            color: var(--dark-text);
        }

        .company-details h1 {
            color: var(--primary-blue);
            margin: 0;
            font-size: 24px;
        }
        
        .company-details h2 {
            color: var(--primary-green);
            margin: 5px 0 0 0;
            font-family: 'Arial', sans-serif;
        }

        .client-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--primary-blue);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        
        input::placeholder {
            text-align: right;
            font-size: 11px;
            opacity: 0.5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: var(--primary-blue);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        
        th span {
            display: block;
            font-size: 11px;
            font-weight: normal;
        }

        td {
            border-bottom: 1px solid #ddd;
            padding: 8px;
        }

        td input {
            border: none;
            background: transparent;
            text-align: center;
        }

        .cost-input {
            text-align: right !important;
        }

        .total-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .total-box {
            width: 300px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }

        .grand-total {
            font-size: 1.2em;
            color: var(--primary-green);
            border-top: 2px solid var(--primary-green);
            margin-top: 5px;
            padding-top: 5px;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: white;
        }

        .btn-print { background-color: var(--primary-blue); }
        .btn-add { background-color: var(--primary-green); }
        .btn-delete { background-color: #ef4444; width: 30px; padding: 5px; }
        
        #logo-upload { display: none; }

        /* PDF Generation hides inputs and styling differently, 
           so we ensure text remains visible */
        .pdf-mode input {
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-add" onclick="addRow()">+ Add Row / إضافة صف</button>
        <button class="btn-print" onclick="downloadPDF()">Download PDF (Phone Name)</button>
        <button style="background-color: #64748b;" onclick="window.print()">Standard Print</button>
        <hr>
        <label for="logo-upload" style="cursor: pointer; color: var(--primary-blue); text-align:center; font-size:12px; font-weight: bold;">
            Swap Logo Temporarily
        </label>
        <input type="file" id="logo-upload" accept="image/*" onchange="loadImage(event)">
    </div>

    <div class="invoice-container" id="bill-content">
        
        <header>
            <div class="logo-section" id="logo-container">
                <img id="logo-img" src="logo.png" alt="Company Logo" onload="hidePlaceholder()" onerror="showPlaceholder()">
                <span id="logo-text" style="color: #999; font-size: 12px;">logo.png not found</span>
            </div>
            <div class="company-details">
                <h1>HOME SWEET HOME Co.</h1>
                <h2>شركة البيت السعيد</h2>
                <p>Block 2, Farwaniya<br>Phone: +965 66435584</p>
            </div>
        </header>

        <div class="client-info">
            <div class="input-group">
                <label><span>Bill Number</span> <span>رقم الفاتورة</span></label>
                <input type="text" placeholder="e.g. 1001">
            </div>

            <div class="input-group">
                <label><span>Invoice Date</span> <span>تاريخ الفاتورة</span></label>
                <input type="date" id="date-picker">
            </div>

            <div class="input-group">
                <label><span>Customer Name</span> <span>اسم العميل</span></label>
                <input type="text" placeholder="Enter Name">
            </div>

            <div class="input-group">
                <label><span>Phone Number</span> <span>رقم الهاتف</span></label>
                <input type="text" id="phone-number" placeholder="e.g. 66435584">
            </div>

            <div class="input-group full-width">
                <label><span>Address</span> <span>العنوان</span></label>
                <input type="text" placeholder="Area, Block, Street">
            </div>
        </div>

        <table id="services-table">
            <thead>
                <tr>
                    <th style="width: 50%; text-align:left;">Service Description<br><span>وصف الخدمة</span></th>
                    <th style="width: 25%;">Duration<br><span>المدة</span></th>
                    <th style="width: 20%; text-align: right;">Cost (KWD)<br><span>التكلفة</span></th>
                    <th style="width: 5%;"></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Service Description"></td>
                    <td><input type="text" placeholder="Duration"></td>
                    <td><input type="number" class="cost-input" value="0" step="0.001" oninput="calculateTotal()"></td>
                    <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)">x</button></td>
                </tr>
            </tbody>
        </table>

        <div class="total-section">
            <div class="total-box">
                <div class="total-row grand-total">
                    <span>Total / المجموع:</span>
                    <span id="grand-total">0.000 KWD</span>
                </div>
            </div>
        </div>

        <div style="margin-top: 50px; text-align: center; color: #666; font-size: 12px;">
            <p>Thank you for choosing Home Sweet Home Co.<br>شكراً لاختياركم شركة البيت السعيد</p>
        </div>

    </div>

    <script>
        document.getElementById('date-picker').valueAsDate = new Date();

        function hidePlaceholder() {
            document.getElementById('logo-text').style.display = 'none';
            document.getElementById('logo-img').style.display = 'block';
        }

        function showPlaceholder() {
            document.getElementById('logo-text').style.display = 'block';
            document.getElementById('logo-img').style.display = 'none';
        }

        function loadImage(event) {
            var image = document.getElementById('logo-img');
            image.src = URL.createObjectURL(event.target.files[0]);
            hidePlaceholder();
        }

        function addRow() {
            const table = document.getElementById('services-table').getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            newRow.innerHTML = `
                <td><input type="text" placeholder="Service"></td>
                <td><input type="text" placeholder="Duration"></td>
                <td><input type="number" class="cost-input" value="0" step="0.001" oninput="calculateTotal()"></td>
                <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)">x</button></td>
            `;
        }

        function deleteRow(btn) {
            btn.closest('tr').remove();
            calculateTotal();
        }

        function calculateTotal() {
            const costs = document.querySelectorAll('.cost-input');
            let total = 0;
            costs.forEach(input => { total += parseFloat(input.value) || 0; });
            document.getElementById('grand-total').textContent = total.toFixed(3) + " KWD";
        }

        // NEW PDF FUNCTION
        function downloadPDF() {
            const element = document.getElementById('bill-content');
            const phoneNumber = document.getElementById('phone-number').value.trim();
            
            // If phone number is missing, use 'invoice' as default name
            const fileName = phoneNumber ? phoneNumber + ".pdf" : "invoice.pdf";

            const opt = {
                margin:       10,
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // New Promise-based usage:
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
